<!DOCTYPE html> 
<html> 
<head> 
    <title>𝕳𝖆𝖉2𝖕</title> 
    <style> 
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding-top: 140px; 
            margin: 0; 
        } 
        h1 { 
            font-family: 'UnifrakturMaguntia', serif; 
            color: #ffffff; 
            font-size: 5.5rem; 
            font-weight: normal; 
            margin-bottom: 20px; 
            text-shadow: 0px 0px 12px rgba(255, 255, 255, 0.1); 
        } 
        p { 
            color: #8b949e; 
            font-size: 1.2rem; 
            margin-bottom: 45px; 
        } 
        .btn-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        } 
        
        /* Custom Replica Badges Built with Unbreakable CSS Layouts */
        .custom-badge {
            display: inline-flex;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            border-radius: 4px;
            overflow: hidden;
            height: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        .custom-badge:hover {
            transform: scale(1.08) translateY(-2px);
        }
        
        /* Dark left-hand block styled like your exact 171A21 choice */
        .badge-left {
            background-color: #171A21;
            color: #ffffff;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }
        
        /* Lighter right-hand block styled like your exact 2A475E choice */
        .badge-right {
            background-color: #2A475E;
            color: #ffffff;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }
        
        /* GitHub variant using your same color layout style */
        .github-right {
            background-color: #24292e;
        }
    </style> 
</head> 
<body> 

    <h1>𝕳𝖆𝖉2𝖕</h1> 
    <p>Welcome to my stupid website i suck at coding never ask me to code</p> 

    <div class="btn-container"> 
        <!-- Pure CSS Steam Badge with Your Exact Colors Built In --> 
        <a href="https://steamcommunity.com" target="_blank" class="custom-badge"> 
            <span class="badge-left">Steam</span>
            <span class="badge-right">Profile</span>
        </a> 

        <!-- Pure CSS GitHub Badge with Matching Split Design --> 
        <a href="https://github.com" target="_blank" class="custom-badge"> 
            <span class="badge-left">GitHub</span>
            <span class="badge-right github-right">Profile</span>
        </a> 
    </div> 

</body> 
</html>
