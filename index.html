<!DOCTYPE html> 
<html> 
<head> 
    <title>𝕳𝖆𝖉2𝖕</title> 

    <style> 
        body { 
            background-color: #000000; /* Shifted to dark black for a better gothic vibe */
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding-top: 140px; 
            margin: 0; 
        } 
        
        /* This applies the Blackletter gothic font to your main title */
        h1 { 
            font-family: 'UnifrakturMaguntia', serif;
            color: #ffffff; 
            font-size: 5.5rem; /* Made it larger so the details show up beautifully */
            font-weight: normal;
            margin-bottom: 20px; 
            text-shadow: 0px 0px 12px rgba(255, 255, 255, 0.1);
        } 
        
        p { 
            color: #8b949e; 
            font-size: 1.2rem; 
            margin-bottom: 45px; 
        } 
        
        .btn-container { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
        } 
        
        .custom-btn { 
            background-color: #111111; 
            color: #888888; 
            border: 1px solid #222222; 
            padding: 12px 24px; 
            font-size: 1rem; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            text-decoration: none; 
            transition: 0.2s ease; 
        } 
        
        /* The buttons turn white and text turns black on hover */
        .custom-btn:hover { 
            background-color: #ffffff; 
            color: #000000; 
            border-color: #ffffff; 
            transform: translateY(-2px); 
        } 
    </style> 
</head> 
<body> 

    <h1>𝕳𝖆𝖉2𝖕</h1> 
    <p>Welcome to my stupid website i suck at coding never ask me to code</p> 

    <div class="btn-container"> 
        <a href="https://steamcommunity.com/id/had2p/" target="_blank" class="custom-btn">My Steam profile</a> 
        <a href="https://github.com" target="_blank" class="custom-btn">GitHub Profile</a> 
    </div> 

</body> 
</html>
