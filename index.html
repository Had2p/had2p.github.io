<!DOCTYPE html> 
<html> 
<head> 
    <title>𝕳𝖆𝖉2𝖕</title> 
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style> 
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding-top: 140px; 
            margin: 0; 
        } 
        
        h1 { 
            font-family: 'UnifrakturMaguntia', serif; 
            color: #ffffff; 
            font-size: 5.5rem; 
            font-weight: normal; 
            margin-bottom: 20px; 
            text-shadow: 0px 0px 12px rgba(255, 255, 255, 0.1); 
        } 
        
        p { 
            color: #8b949e; 
            font-size: 1.2rem; 
            margin-bottom: 35px; 
        } 
        
        /* Centering container for your Shields.io badge */
        .badge-container { 
            margin-bottom: 45px; 
        } 
        
        .badge-container img { 
            height: 28px; /* Perfectly scales the badge on your page */
            transition: transform 0.2s ease; 
        } 
        
        .badge-container img:hover { 
            transform: scale(1.08); 
        } 
        
        .btn-container { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
        } 
        
        .custom-btn { 
            background-color: #111111; 
            color: #888888; 
            border: 1px solid #222222; 
            padding: 12px 24px; 
            font-size: 1rem; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            text-decoration: none; 
            transition: 0.2s ease; 
        } 
        
        .custom-btn:hover { 
            background-color: #ffffff; 
            color: #000000; 
            border-color: #ffffff; 
            transform: translateY(-2px); 
        } 
    </style> 
</head> 
<body> 

    <h1>𝕳𝖆𝖉2𝖕</h1> 
    <p>Welcome to my stupid website i suck at coding never ask me to code</p> 

    <!-- Your converted Shields.io badge linking directly to your Steam profile -->
    <div class="badge-container"> 
        <a href="https://steamcommunity.com" target="_blank"> 
            <img src="https://shields.io" alt="Steam Profile Badge"/> 
        </a> 
    </div> 

    <div class="btn-container"> 
        <a href="https://steamcommunity.com" target="_blank" class="custom-btn">My Steam profile</a> 
        <a href="https://github.com" target="_blank" class="custom-btn">GitHub Profile</a> 
    </div> 

</body> 
</html>
