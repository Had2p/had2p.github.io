<!DOCTYPE html> 
<html> 
<head> 
    <title>𝕳𝖆𝖉2𝖕</title> 
    
   
    <style> 
        body { 
            background-color: #000000; /* Dark black background */ 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding-top: 140px; 
            margin: 0; 
        } 
        
        /* This applies the Blackletter gothic font to your main title */ 
        h1 { 
            font-family: 'UnifrakturMaguntia', serif; 
            color: #ffffff; 
            font-size: 5.5rem; 
            font-weight: normal; 
            margin-bottom: 20px; 
            text-shadow: 0px 0px 12px rgba(255, 255, 255, 0.1); 
        } 
        
        p { 
            color: #8b949e; 
            font-size: 1.2rem; 
            margin-bottom: 45px; 
        } 
        
        /* Container to style your modern Shields.io button links */ 
        .btn-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        } 
        
        .badge-link {
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        /* Adds a nice hover action when you move your cursor over the badges */
        .badge-link:hover {
            transform: scale(1.08) translateY(-2px);
        }

        .badge-link img {
            height: 40px; /* Makes the badges large and clear to read */
            border-radius: 4px;
        }
    </style> 
</head> 
<body> 

    <h1>𝕳𝖆𝖉2𝖕</h1> 
    <p>Welcome to my stupid website i suck at coding never ask me to code</p> 

    <!-- Navigation profile area using only high-quality Shields.io badges -->
    <div class="btn-container"> 
        <!-- Your custom Steam profile badge button using your markdown link converted to HTML -->
        <a href="https://steamcommunity.com/id/had2p" target="_blank" class="badge-link">
            <img src="https://shields.io" alt="Steam"/>
        </a>

        <!-- Matching GitHub profile badge button -->
        <a href="https://github.com" target="_blank" class="badge-link">
            <img src="https://shields.io" alt="GitHub Profile"/>
        </a>
    </div> 

</body> 
</html>
